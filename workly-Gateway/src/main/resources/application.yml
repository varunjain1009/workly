server:
  port: 8000

spring:
  application:
    name: workly-gateway
  cloud:
    gateway:
      routes:
        # Auth Service
        - id: auth-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/auth/**

        # Chat Service
        - id: chat-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/chat/**,/ws/chat/**

        # Search Service
        - id: search-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/skills/**,/api/v1/normalization/**

        # Config Service
        - id: config-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/config/**,/api/v1/configs/**

        # Main Server (fallback - all other routes)
        - id: server-fallback
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/**,/ws/tracking/**,/health

      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
            methods: GET
            backoff:
              firstBackoff: 100ms
              maxBackoff: 500ms
              factor: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
