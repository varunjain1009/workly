spring:
  datasource:
    url: jdbc:h2:mem:workly;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  data:
    mongodb:
      uri: mongodb://localhost:27017/workly?directConnection=true
      auto-index-creation: false
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

auth:
  token:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    ttl-hours: 24

monetisation:
  enabled: true

management:
  health:
    redis:
      enabled: false
    elasticsearch:
      enabled: false
