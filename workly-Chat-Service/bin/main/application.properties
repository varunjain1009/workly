server.port=8082
spring.application.name=workly-chat-service

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/workly_chat

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=chat-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JWT Secret (Should be same as Server)
app.jwtSecret=worklySecretKeyForJwtAuthenticationPleaseChangeIdeally
app.jwtExpirationMs=86400000

# Logging
logging.level.com.workly.chat=DEBUG
